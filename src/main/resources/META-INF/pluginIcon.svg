<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Outer skin gradient -->
    <radialGradient id="skinGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#7b241c"/>
    </radialGradient>
    <!-- Flesh gradient -->
    <radialGradient id="fleshGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#f1948a"/>
      <stop offset="70%" stop-color="#e74c3c"/>
      <stop offset="100%" stop-color="#cb4335"/>
    </radialGradient>
    <!-- Inner core gradient -->
    <radialGradient id="coreGrad" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#fadbd8"/>
      <stop offset="100%" stop-color="#f1948a"/>
    </radialGradient>
    <!-- Seed gradient -->
    <radialGradient id="seedGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#f9ebea"/>
      <stop offset="100%" stop-color="#d5d8dc"/>
    </radialGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#7b241c" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Outer skin ring -->
  <circle cx="50" cy="50" r="47" fill="url(#skinGrad)" filter="url(#shadow)"/>

  <!-- Subtle skin texture ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#a93226" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- Flesh -->
  <circle cx="50" cy="50" r="41" fill="url(#fleshGrad)"/>

  <!-- Inner paler zone (around seeds) -->
  <circle cx="50" cy="50" r="26" fill="url(#coreGrad)" opacity="0.85"/>

  <!-- Radial flesh lines (like a real cucumber cross-section) -->
  <g stroke="#e74c3c" stroke-width="0.7" opacity="0.5">
    <line x1="50" y1="24" x2="50" y2="9"/>
    <line x1="50" y1="76" x2="50" y2="91"/>
    <line x1="24" y1="50" x2="9" y2="50"/>
    <line x1="76" y1="50" x2="91" y2="50"/>
    <line x1="30.5" y1="30.5" x2="19.5" y2="19.5"/>
    <line x1="69.5" y1="30.5" x2="80.5" y2="19.5"/>
    <line x1="30.5" y1="69.5" x2="19.5" y2="80.5"/>
    <line x1="69.5" y1="69.5" x2="80.5" y2="80.5"/>
  </g>

  <!-- Seeds — arranged in a ring pattern like a real cucumber -->
  <!-- Top -->
  <ellipse cx="50" cy="28" rx="4.5" ry="3" fill="url(#seedGrad)" stroke="#bdc3c7" stroke-width="0.5" transform="rotate(0,50,50)"/>
  <!-- Top-right -->
  <ellipse cx="50" cy="28" rx="4.5" ry="3" fill="url(#seedGrad)" stroke="#bdc3c7" stroke-width="0.5" transform="rotate(51.4,50,50)"/>
  <!-- Right -->
  <ellipse cx="50" cy="28" rx="4.5" ry="3" fill="url(#seedGrad)" stroke="#bdc3c7" stroke-width="0.5" transform="rotate(102.8,50,50)"/>
  <!-- Bottom-right -->
  <ellipse cx="50" cy="28" rx="4.5" ry="3" fill="url(#seedGrad)" stroke="#bdc3c7" stroke-width="0.5" transform="rotate(154.2,50,50)"/>
  <!-- Bottom -->
  <ellipse cx="50" cy="28" rx="4.5" ry="3" fill="url(#seedGrad)" stroke="#bdc3c7" stroke-width="0.5" transform="rotate(205.7,50,50)"/>
  <!-- Bottom-left -->
  <ellipse cx="50" cy="28" rx="4.5" ry="3" fill="url(#seedGrad)" stroke="#bdc3c7" stroke-width="0.5" transform="rotate(257.1,50,50)"/>
  <!-- Left -->
  <ellipse cx="50" cy="28" rx="4.5" ry="3" fill="url(#seedGrad)" stroke="#bdc3c7" stroke-width="0.5" transform="rotate(308.5,50,50)"/>

  <!-- Center dot -->
  <circle cx="50" cy="50" r="3.5" fill="url(#seedGrad)" stroke="#bdc3c7" stroke-width="0.5"/>

  <!-- Highlight sheen -->
  <ellipse cx="38" cy="25" rx="10" ry="6" fill="white" opacity="0.12" transform="rotate(-20,38,25)"/>
</svg>
